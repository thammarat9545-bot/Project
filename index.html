<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Meeting Notes</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: white; }
.glass-card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
}
.gradient-bg {
    background: radial-gradient(circle at top left, #1e293b 0%, #0b0f1a 100%);
}
</style>
</head>

<body class="gradient-bg min-h-screen">

<!-- LOGIN PAGE -->
<div id="login-page" class="flex min-h-screen">
    <div class="w-full flex items-center justify-center bg-[#0d1117] px-8">
        <div class="w-full max-w-md p-10 rounded-3xl glass-card border-white/10 shadow-2xl">
            <h2 class="text-3xl font-bold mb-6">Sign in</h2>

            <input type="text" placeholder="Username"
                class="w-full mb-4 bg-[#161b22] border border-gray-700 rounded-xl py-3 px-4">

            <input type="password" placeholder="Password"
                class="w-full mb-6 bg-[#161b22] border border-gray-700 rounded-xl py-3 px-4">

            <button onclick="showDashboard()"
                class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl">
                เข้าสู่ระบบ
            </button>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden flex flex-col min-h-screen">

<nav class="flex justify-between p-4 border-b border-white/10">
    <h1 class="font-bold">AI Meeting Notes</h1>
    <button onclick="showLogin()">ออกจากระบบ</button>
</nav>

<main class="flex-1 p-6">
    <textarea id="noteArea"
        placeholder="พิมพ์โน้ต หรือกดปุ่มไมค์เพื่อพูด..."
        class="w-full h-[60vh] p-4 rounded-xl bg-[#0d1117] border border-white/10"></textarea>

    <div class="flex gap-4 mt-4">
        <button onclick="startListening()" id="micBtn"
            class="bg-blue-600 px-6 py-3 rounded-xl flex items-center gap-2">
            <i data-lucide="mic"></i> เริ่มอัดเสียง
        </button>

        <button onclick="stopListening()"
            class="bg-red-600 px-6 py-3 rounded-xl flex items-center gap-2">
            <i data-lucide="mic-off"></i> หยุดอัดเสียง
        </button>
    </div>
</main>
</div>

<script>
lucide.createIcons();

function showDashboard(){
    login-page.classList.add('hidden');
    dashboard.classList.remove('hidden');
}
function showLogin(){
    dashboard.classList.add('hidden');
    login-page.classList.remove('hidden');
}

// ===== Speech To Text =====
let recognition;
let isListening = false;

function startListening() {
    if (!('webkitSpeechRecognition' in window)) {
        alert("เบราว์เซอร์ไม่รองรับการอัดเสียง");
        return;
    }

    recognition = new webkitSpeechRecognition();
    recognition.lang = 'th-TH';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
        isListening = true;
        micBtn.innerHTML = '🎤 กำลังอัดเสียง...';
    };

    recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        document.getElementById('noteArea').value += transcript;
    };

    recognition.onerror = (event) => {
        alert("เกิดข้อผิดพลาด: " + event.error);
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.innerHTML = '<i data-lucide="mic"></i> เริ่มอัดเสียง';
        lucide.createIcons();
    };

    recognition.start();
}

function stopListening() {
    if (recognition && isListening) recognition.stop();
}
</script>

</body>
</html>
